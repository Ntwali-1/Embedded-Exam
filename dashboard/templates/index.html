<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temperature Dashboard — Rutaganira Yanis Ntwali</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      min-height: 100vh;
      color: #e2e8f0;
      padding: 24px;
    }

    .container { max-width: 720px; margin: 0 auto; }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    header p { color: #94a3b8; font-size: 0.95rem; }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.85rem;
      background: rgba(255, 255, 255, 0.08);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
    }

    .dot.live { background: #22c55e; box-shadow: 0 0 8px #22c55e; }

    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      margin-bottom: 20px;
      backdrop-filter: blur(8px);
    }

    .card label {
      display: block;
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .temp {
      font-size: 4rem;
      font-weight: 700;
      line-height: 1;
      color: #38bdf8;
    }

    .temp span { font-size: 2rem; color: #94a3b8; }

    .updated { margin-top: 12px; color: #94a3b8; font-size: 0.9rem; }

    .info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .info-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 14px;
    }

    .info-box small {
      display: block;
      color: #64748b;
      font-size: 0.75rem;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .info-box strong {
      font-size: 0.9rem;
      word-break: break-all;
    }

    .history h2 {
      font-size: 1rem;
      margin-bottom: 12px;
      color: #cbd5e1;
    }

    .history ul {
      list-style: none;
      max-height: 220px;
      overflow-y: auto;
    }

    .history li {
      display: flex;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.9rem;
    }

    .history li:first-child {
      background: rgba(56, 189, 248, 0.1);
      border-radius: 8px;
    }

    .waiting { color: #64748b; font-style: italic; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Temperature Monitoring Dashboard</h1>
      <p>{{ candidate_name }}</p>
      <div class="status">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Connecting to MQTT...</span>
      </div>
    </header>

    <div class="card">
      <label>Current Temperature</label>
      <div class="temp" id="temperature">--<span> °C</span></div>
      <div class="updated" id="updatedAt">Waiting for data from Arduino...</div>
    </div>

    <div class="info">
      <div class="info-box">
        <small>MQTT Broker</small>
        <strong>{{ broker }}</strong>
      </div>
      <div class="info-box">
        <small>MQTT Topic</small>
        <strong>{{ topic }}</strong>
      </div>
    </div>

    <div class="card history">
      <h2>Recent Readings</h2>
      <ul id="historyList">
        <li class="waiting">No readings yet</li>
      </ul>
    </div>
  </div>

  <script>
    async function refresh() {
      try {
        const res = await fetch("/api/data");
        const data = await res.json();

        const dot = document.getElementById("statusDot");
        const statusText = document.getElementById("statusText");
        const tempEl = document.getElementById("temperature");
        const updatedEl = document.getElementById("updatedAt");
        const historyList = document.getElementById("historyList");

        if (data.mqtt_connected) {
          dot.classList.add("live");
          statusText.textContent = "MQTT connected — live";
        } else {
          dot.classList.remove("live");
          statusText.textContent = "MQTT disconnected";
        }

        if (data.temperature !== null) {
          tempEl.innerHTML = data.temperature + '<span> °C</span>';
          updatedEl.textContent = "Last update: " + data.updated_at;
        }

        if (data.history.length === 0) {
          historyList.innerHTML = '<li class="waiting">No readings yet — run mqtt_client.py on PC</li>';
        } else {
          historyList.innerHTML = data.history
            .map(item => `<li><span>${item.time}</span><strong>${item.temp} °C</strong></li>`)
            .join("");
        }
      } catch (err) {
        document.getElementById("statusText").textContent = "Dashboard error";
      }
    }

    refresh();
    setInterval(refresh, 2000);
  </script>
</body>
</html>
